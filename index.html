<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit 306BSP | Duenas General Comprehensive High School</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Design System Colors */
        :root {
            --scout-green: #1a3d2b;
            --scout-gold: #c9a227;
            --scout-cream: #f5f0e8;
            --text-dark: #0f1f17;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--scout-cream);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: var(--scout-green);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--scout-gold);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--scout-gold);
        }

        /* Hero Section */
        .hero {
            background-color: var(--scout-green);
            color: var(--white);
            padding: 6rem 5%;
            text-align: center;
            border-bottom: 6px solid var(--scout-gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2.5rem;
            opacity: 0.9;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--scout-gold);
            color: var(--scout-green);
            padding: 1rem 2.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(201, 162, 39, 0.4);
        }

        /* Stats Strip */
        .stats-strip {
            background-color: var(--white);
            padding: 3rem 5%;
            display: flex;
            justify-content: center;
            gap: 4rem;
            flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--scout-green);
            font-weight: 900;
            display: block;
        }

        .stat-label {
            color: #4a7c59;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .nav-links {
                display: none; /* Will need a hamburger menu later */
            }
            .stats-strip {
                gap: 2rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">Outfit 306BSP</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Programs</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Build Character.<br>Serve Others.<br>Lead with Honor.</h1>
        <p>Join Outfit 306BSP — the scouting family of Duenas General Comprehensive High School. Discover your potential today.</p>
        <a href="#join" class="cta-button">Join Our Troop</a>
    </section>

    <section class="stats-strip">
        <div class="stat-item">
            <span class="stat-number">120+</span>
            <span class="stat-label">Active Scouts</span>
        </div>
        <div class="stat-item">
            <span class="stat-number">15</span>
            <span class="stat-label">Years Strong</span>
        </div>
        <div class="stat-item">
            <span class="stat-number">30+</span>
            <span class="stat-label">Annual Events</span>
        </div>
    </section>

</body>
</html>
